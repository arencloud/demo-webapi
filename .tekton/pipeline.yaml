apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: demo-webapi-ci-cd
  labels:
    app.kubernetes.io/name: demo-webapi
spec:
  description: Build, test, push image, and promote by updating GitOps overlay tags.
  params:
    - name: appRepoUrl
      type: string
      description: Source repository URL.
    - name: appRevision
      type: string
      default: main
    - name: gitOpsRepoUrl
      type: string
      description: GitOps repository URL (can be same repo for demo).
    - name: gitOpsRevision
      type: string
      default: main
    - name: imageRepo
      type: string
      description: Full image repository, e.g. quay.io/org/demo-webapi.
    - name: imageTag
      type: string
      default: latest
    - name: targetEnvironment
      type: string
      default: dev
      description: One of dev, stage, prod.
  workspaces:
    - name: shared-workspace
    - name: git-auth
      optional: true
  tasks:
    - name: clone-app
      taskRef:
        kind: ClusterTask
        name: git-clone
      params:
        - name: url
          value: $(params.appRepoUrl)
        - name: revision
          value: $(params.appRevision)
        - name: deleteExisting
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace
        - name: basic-auth
          workspace: git-auth

    - name: unit-test
      runAfter:
        - clone-app
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: go-test
            image: golang:1.25
            workingDir: $(workspaces.source.path)
            script: |
              #!/usr/bin/env sh
              set -euo pipefail
              go test ./...
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: build-and-push
      runAfter:
        - unit-test
      taskRef:
        kind: ClusterTask
        name: buildah
      params:
        - name: IMAGE
          value: $(params.imageRepo):$(params.imageTag)
        - name: DOCKERFILE
          value: ./Dockerfile
        - name: CONTEXT
          value: .
        - name: TLSVERIFY
          value: "true"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: clone-gitops
      runAfter:
        - build-and-push
      taskRef:
        kind: ClusterTask
        name: git-clone
      params:
        - name: url
          value: $(params.gitOpsRepoUrl)
        - name: revision
          value: $(params.gitOpsRevision)
        - name: deleteExisting
          value: "false"
        - name: subdirectory
          value: gitops-repo
      workspaces:
        - name: output
          workspace: shared-workspace
        - name: basic-auth
          workspace: git-auth

    - name: promote
      runAfter:
        - clone-gitops
      taskSpec:
        params:
          - name: imageRepo
            type: string
          - name: imageTag
            type: string
          - name: targetEnvironment
            type: string
        workspaces:
          - name: source
        steps:
          - name: update-kustomize-image
            image: registry.access.redhat.com/ubi9/ubi-minimal
            workingDir: $(workspaces.source.path)/gitops-repo
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              env="$(params.targetEnvironment)"
              file="gitops/overlays/${env}/kustomization.yaml"
              if [[ ! -f "${file}" ]]; then
                echo "Missing overlay file: ${file}" >&2
                exit 1
              fi

              sed -i "s|newName: .*|newName: $(params.imageRepo)|" "${file}"
              sed -i "s|newTag: .*|newTag: $(params.imageTag)|" "${file}"

          - name: commit-and-push
            image: alpine/git:2.47.2
            workingDir: $(workspaces.source.path)/gitops-repo
            script: |
              #!/usr/bin/env sh
              set -euo pipefail
              git config user.name "tekton-bot"
              git config user.email "tekton-bot@local"
              git add gitops/overlays/$(params.targetEnvironment)/kustomization.yaml

              if git diff --cached --quiet; then
                echo "No GitOps changes to commit"
                exit 0
              fi

              git commit -m "Promote demo-webapi to $(params.targetEnvironment): $(params.imageTag)"
              git push origin HEAD:$(params.gitOpsRevision)
      params:
        - name: imageRepo
          value: $(params.imageRepo)
        - name: imageTag
          value: $(params.imageTag)
        - name: targetEnvironment
          value: $(params.targetEnvironment)
      workspaces:
        - name: source
          workspace: shared-workspace
