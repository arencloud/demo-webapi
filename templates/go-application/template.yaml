apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: go-application
  title: Go Application
  description: Scaffold a Go API service with catalog metadata and TechDocs.
  tags:
    - go
    - api
    - rhdh
spec:
  owner: group:default/platform-team
  type: service

  parameters:
    - title: Service details
      required:
        - name
        - owner
        - repoUrl
      properties:
        name:
          title: Name
          type: string
          description: Unique service name (kebab-case)
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
        description:
          title: Description
          type: string
          default: Go API service
        owner:
          title: Owner
          type: string
          description: Catalog owner entity reference, e.g. group:default/platform-team
          default: group:default/platform-team
        repoUrl:
          title: Repository location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: Fetch skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: Publish repository
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: ${{ parameters.description }}
        defaultBranch: main

    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
